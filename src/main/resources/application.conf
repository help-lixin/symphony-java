# Symphony Akka Configuration
# Akka Typed Configuration

akka {
  loglevel = "INFO"
  log-config-on-start = off
  stdout-loglevel = "WARNING"

  actor {
    typed {
      default-mailbox {
        mailbox-type = "akka.dispatch.SingleConsumerOnlyUnboundedMailbox"
      }
    }

    default-dispatcher {
      type = Dispatcher
      executor = "fork-join-executor"
      fork-join-executor {
        parallelism-min = 2
        parallelism-max = 16
      }
    }
  }
}

# 日志配置
logback {
  configurationFile = "logback.xml"
}
